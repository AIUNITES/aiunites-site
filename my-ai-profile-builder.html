  <script>
  // ── Constants ──────────────────────────────────────────────────
  var USER_KEY = 'aiunites_currentUser';
  var PROFILE_PREFIX = 'aiunites_aiprofiles_';

  // ── Auth ────────────────────────────────────────────────────────
  function getCurrentUser() {
    try { return JSON.parse(localStorage.getItem(USER_KEY)); } catch(e) { return null; }
  }

  function getProfileKey(user) {
    return PROFILE_PREFIX + (user.username || 'guest');
  }

  // ── Profile storage ─────────────────────────────────────────────
  function loadProfiles(user) {
    try { return JSON.parse(localStorage.getItem(getProfileKey(user))) || []; } catch(e) { return []; }
  }

  function saveProfiles(user, profiles) {
    localStorage.setItem(getProfileKey(user), JSON.stringify(profiles));
  }

  // ── State ────────────────────────────────────────────────────────
  var tags = { avoid: [], prefer: [], never: [], always: [] };
  var projects = [];
  var terms = [];
  var activeProfileId = null;
  var currentUser = null;

  // ── Init ─────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function() {
    currentUser = getCurrentUser();
    if (!currentUser) {
      // Guest mode — profiles saved under 'guest' key in localStorage, no login required
      currentUser = { username: 'guest', displayName: 'Guest', isGuest: true };
    }
    renderBuilder();
  });

  // ── Login gate ───────────────────────────────────────────────────
  function renderLoginGate() {

  function buildStep(num, title, sub, body) {
    return '<div class="step' + (num === 1 ? ' open' : '') + '" id="step-' + num + '">' +
      '<div class="step-header" onclick="toggleStep(\'step-' + num + '\')">' +
        '<div class="step-num" id="num-' + num + '">' + num + '</div>' +
        '<div><div class="step-title">' + title + '</div><div class="step-subtitle">' + sub + '</div></div>' +
        '<div class="step-arrow">&#9660;</div>' +
      '</div>' +
      '<div class="step-body">' + body + '</div>' +
    '</div>';
  }

  function field(label, id, type, placeholder, optional, hint) {
    var optStr = optional ? ' <span style="color:rgba(255,255,255,.2);font-weight:400">(optional)</span>' : '';
    var hintStr = hint ? '<div class="field-hint">' + hint + '</div>' : '';
    var inputHtml = type === 'textarea'
      ? '<textarea id="' + id + '" placeholder="' + placeholder + '" oninput="rebuild()"></textarea>'
      : '<input type="text" id="' + id + '" placeholder="' + placeholder + '" oninput="rebuild()">';
    return '<div class="field"><label>' + label + optStr + '</label>' + inputHtml + hintStr + '</div>';
  }

  function fieldSelect(label, id, options) {
    var opts = options.map(function(o) { return '<option value="' + o[0] + '">' + o[1] + '</option>'; }).join('');
    return '<div class="field"><label>' + label + '</label><select id="' + id + '" onchange="rebuild()">' + opts + '</select></div>';
  }

  function tagField(group, label, placeholder, hint) {
    var hintStr = hint ? '<div class="field-hint">' + hint + '</div>' : '';
    return '<div class="field"><label>' + label + ' <span style="color:rgba(255,255,255,.2);font-weight:400">(press Enter)</span></label>' +
      '<div class="tag-input-wrap" id="' + group + '-wrap" onclick="document.getElementById(\'' + group + '-input\').focus()">' +
        '<input class="tag-input" id="' + group + '-input" placeholder="' + placeholder + '" onkeydown="tagKey(event,\'' + group + '\')">' +
      '</div>' + hintStr + '</div>';
  }

  // ── Profile CRUD ─────────────────────────────────────────────────
  function newProfile() {
    clearForm();
    activeProfileId = null;
    document.getElementById('profile-name').value = '';
    refreshProfileList();
    rebuild();
    document.getElementById('profile-name').focus();
  }

  function saveProfile() {
    var name = (document.getElementById('profile-name').value || '').trim();
    if (!name) { toast('Give this profile a name first'); document.getElementById('profile-name').focus(); return; }

    var profiles = loadProfiles(currentUser);
    var profileData = buildProfileData();
    var id = activeProfileId || ('p_' + Date.now());

    var existing = profiles.findIndex(function(p) { return p.id === id; });
    var entry = { id: id, name: name, updatedAt: Date.now(), data: profileData };

    if (existing >= 0) {
      profiles[existing] = entry;
    } else {
      profiles.unshift(entry);
      activeProfileId = id;
    }

    saveProfiles(currentUser, profiles);
    refreshProfileList();

    var btn = document.getElementById('btn-save');
    btn.textContent = '&#10003; Saved';
    btn.classList.add('saved');
    setTimeout(function() { btn.innerHTML = '&#128190; Save'; btn.classList.remove('saved'); }, 2000);
    toast('Profile saved');
  }

  function loadProfileById(id) {
    var profiles = loadProfiles(currentUser);
    var entry = profiles.find(function(p) { return p.id === id; });
    if (!entry) return;
    activeProfileId = id;
    document.getElementById('profile-name').value = entry.name;
    restoreFormData(entry.data);
    refreshProfileList();
    rebuild();
  }

  function deleteProfile(id, e) {
    e.stopPropagation();
    var profiles = loadProfiles(currentUser);
    var entry = profiles.find(function(p) { return p.id === id; });
    if (!entry) return;
    if (!confirm('Delete "' + entry.name + '"?')) return;
    profiles = profiles.filter(function(p) { return p.id !== id; });
    saveProfiles(currentUser, profiles);
    if (activeProfileId === id) {
      if (profiles.length) { loadProfileById(profiles[0].id); }
      else { newProfile(); }
    }
    refreshProfileList();
    toast('Profile deleted');
  }

  function refreshProfileList() {
    var list = document.getElementById('profile-list');
    if (!list) return;
    var profiles = loadProfiles(currentUser);
    if (!profiles.length) {
      list.innerHTML = '<div class="profile-empty">No saved profiles yet.<br>Fill in the form and click Save.</div>';
      return;
    }
    list.innerHTML = profiles.map(function(p) {
      var active = p.id === activeProfileId ? ' active' : '';
      var d = new Date(p.updatedAt);
      var dateStr = (d.getMonth()+1) + '/' + d.getDate();
      return '<div class="profile-item' + active + '" onclick="loadProfileById(\'' + p.id + '\')">' +
        '<span class="pname">' + esc(p.name) + '</span>' +
        '<span style="font-size:.7rem;color:rgba(255,255,255,.25);flex-shrink:0">' + dateStr + '</span>' +
        '<button class="pdel" onclick="deleteProfile(\'' + p.id + '\', event)" title="Delete">&#10005;</button>' +
      '</div>';
    }).join('');
  }

  // ── Form helpers ─────────────────────────────────────────────────
  function clearForm() {
    tags = { avoid: [], prefer: [], never: [], always: [] };
    projects = [];
    terms = [];
    ['f-name','f-role','f-domain','f-location','f-expertise',
     'f-length','f-tone','f-codestyle','f-focus','f-context'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = '';
    });
    ['avoid','prefer','never','always'].forEach(function(g) { renderTags(g); });
    renderProjects();
    renderTerms();
  }

  function restoreFormData(data) {
    if (!data) return;
    clearForm();
    var id = data.identity || {};
    sv('f-name', id.name); sv('f-role', id.role); sv('f-domain', id.domain);
    sv('f-location', id.location); sv('f-expertise', id.expertise_level);
    var pr = data.preferences || {};
    sv('f-length', pr.response_length); sv('f-tone', pr.tone); sv('f-codestyle', pr.code_style);
    tags.avoid  = (pr.avoid   || []).slice();
    tags.prefer = (pr.prefer  || []).slice();
    tags.never  = ((data.constraints || {}).never_use  || []).slice();
    tags.always = ((data.constraints || {}).always_use || []).slice();
    ['avoid','prefer','never','always'].forEach(function(g) { renderTags(g); });
    projects = (data.projects || []).map(function(p, i) {
      return { id: Date.now() + i, name: p.name||'', description: p.description||'', stack: p.stack||[], status: p.status||'active' };
    });
    renderProjects();
    terms = Object.entries(data.terminology || {}).map(function(kv, i) {
      return { id: Date.now() + i + 1000, key: kv[0], value: kv[1] };
    });
    renderTerms();
    var sess = data.session || {};
    sv('f-focus', sess.focus); sv('f-context', sess.context);
  }

  function sv(id, val) {
    var el = document.getElementById(id);
    if (el && val != null) el.value = val;
  }

  function onNameChange() { /* allow typing freely */ }

  // ── Tag input ────────────────────────────────────────────────────
  function tagKey(e, group) {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      var inp = e.target;
      var val = inp.value.trim().replace(/,$/, '');
      if (!val) return;
      tags[group].push(val);
      inp.value = '';
      renderTags(group);
      rebuild();
    }
    if (e.key === 'Backspace' && e.target.value === '' && tags[group].length) {
      tags[group].pop();
      renderTags(group);
      rebuild();
    }
  }

  function renderTags(group) {
    var wrap = document.getElementById(group + '-wrap');
    if (!wrap) return;
    var inp = document.getElementById(group + '-input');
    wrap.querySelectorAll('.tag').forEach(function(t) { t.remove(); });
    tags[group].forEach(function(val, i) {
      var pill = document.createElement('span');
      pill.className = 'tag';
      pill.innerHTML = esc(val) + '<span class="rm" onclick="removeTag(\'' + group + '\',' + i + ')">&#10005;</span>';
      wrap.insertBefore(pill, inp);
    });
  }

  function removeTag(group, i) {
    tags[group].splice(i, 1);
    renderTags(group);
    rebuild();
  }

  // ── Projects ──────────────────────────────────────────────────────
  function addProject() {
    projects.push({ id: Date.now(), name: '', description: '', stack: [], status: 'active' });
    renderProjects();
    rebuild();
  }

  function removeProject(id) {
    projects = projects.filter(function(p) { return p.id !== id; });
    renderProjects();
    rebuild();
  }

  function renderProjects() {
    var list = document.getElementById('projects-list');
    if (!list) return;
    list.innerHTML = '';
    projects.forEach(function(p, idx) {
      var div = document.createElement('div');
      div.className = 'project-row';
      div.innerHTML =
        '<div class="project-row-head"><span>Project ' + (idx+1) + '</span>' +
        '<button class="rm-project" onclick="removeProject(' + p.id + ')">Remove</button></div>' +
        '<div class="field"><label>Name</label>' +
        '<input type="text" value="' + esc(p.name) + '" placeholder="e.g. AIUNITES Network" oninput="updateProject(' + p.id + ',\'name\',this.value)"></div>' +
        '<div class="field"><label>Description</label>' +
        '<input type="text" value="' + esc(p.description) + '" placeholder="One sentence" oninput="updateProject(' + p.id + ',\'description\',this.value)"></div>' +
        '<div class="field"><label>Stack (comma separated)</label>' +
        '<input type="text" value="' + esc(p.stack.join(', ')) + '" placeholder="e.g. HTML, Vanilla JS, PowerShell" oninput="updateProjectStack(' + p.id + ',this.value)"></div>' +
        '<div class="field"><label>Status</label>' +
        '<select onchange="updateProject(' + p.id + ',\'status\',this.value)">' +
        '<option value="active"' + (p.status==='active'?' selected':'') + '>Active</option>' +
        '<option value="paused"' + (p.status==='paused'?' selected':'') + '>Paused</option>' +
        '<option value="complete"' + (p.status==='complete'?' selected':'') + '>Complete</option>' +
        '</select></div>';
      list.appendChild(div);
    });
  }

  function updateProject(id, key, val) {
    var p = projects.find(function(p) { return p.id === id; });
    if (p) { p[key] = val; rebuild(); }
  }

  function updateProjectStack(id, val) {
    var p = projects.find(function(p) { return p.id === id; });
    if (p) { p.stack = val.split(',').map(function(s){ return s.trim(); }).filter(Boolean); rebuild(); }
  }

  // ── Terms ─────────────────────────────────────────────────────────
  function addTerm() {
    terms.push({ id: Date.now(), key: '', value: '' });
    renderTerms();
    rebuild();
  }

  function removeTerm(id) {
    terms = terms.filter(function(t) { return t.id !== id; });

    rebuild();

  function renderTerms() {
    var list = document.getElementById('terms-list');
    if (!list) return;
    list.innerHTML = '';
    terms.forEach(function(t) {
      var div = document.createElement('div');
      div.className = 'term-row';
      div.innerHTML =

        '<input type="text" value="' + esc(t.value) + '" placeholder="What it means to you" oninput="updateTerm(' + t.id + ',\'value\',this.value)">' +
        '<button class="rm-term" onclick="removeTerm(' + t.id + ')">&#10005;</button>';
      list.appendChild(div);
    });

  function updateTerm(id, key, val) {
    var t = terms.find(function(t) { return t.id === id; });

  // ── Step accordion ────────────────────────────────────────────────
  function toggleStep(id) {
    var el = document.getElementById(id);
    var wasOpen = el.classList.contains('open');
    document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('open'); });
    if (!wasOpen) el.classList.add('open');

  // ── Build profile data object ─────────────────────────────────────
  function buildProfileData() {
    var profile = { aiunites_ai_profile: '1.0' };

    var identity = {};
    var name = v('f-name'), role = v('f-role'), domain = v('f-domain');
    if (name) identity.name = name;
    if (role) identity.role = role;
    if (domain) identity.domain = domain;
    var loc = v('f-location'); if (loc) identity.location = loc;
    var exp = v('f-expertise'); if (exp) identity.expertise_level = exp;
    if (Object.keys(identity).length) profile.identity = identity;

    var prefs = {};
    var len = v('f-length'); if (len) prefs.response_length = len;
    var tone = v('f-tone'); if (tone) prefs.tone = tone;
    var cs = v('f-codestyle'); if (cs) prefs.code_style = cs;
    if (tags.avoid.length) prefs.avoid = tags.avoid.slice();
    if (tags.prefer.length) prefs.prefer = tags.prefer.slice();
    if (Object.keys(prefs).length) profile.preferences = prefs;

    var projs = projects.filter(function(p) { return p.name || p.description; })
      .map(function(p) {
        var obj = {}; if (p.name) obj.name = p.name; if (p.description) obj.description = p.description;
        if (p.stack.length) obj.stack = p.stack; if (p.status) obj.status = p.status; return obj;
      });
    if (projs.length) profile.projects = projs;

    var termObj = {};
    terms.forEach(function(t) { if (t.key && t.value) termObj[t.key] = t.value; });
    if (Object.keys(termObj).length) profile.terminology = termObj;

    var constr = {};
    if (tags.never.length) constr.never_use = tags.never.slice();
    if (tags.always.length) constr.always_use = tags.always.slice();
    if (Object.keys(constr).length) profile.constraints = constr;

    var sess = {};
    var focus = v('f-focus'); if (focus) sess.focus = focus;
    var ctx = v('f-context'); if (ctx) sess.context = ctx;
    if (Object.keys(sess).length) profile.session = sess;

    return profile;
  }

  // ── Syntax highlight ──────────────────────────────────────────────
  function highlight(json) {
    return json
      .replace(/("(?:[^"\\]|\\.)*")(\s*:)/g, '<span class="j-key">$1</span>$2')
      .replace(/:\s*("(?:[^"\\]|\\.)*")/g, ': <span class="j-str">$1</span>')
      .replace(/:\s*(\d+\.?\d*)/g, ': <span class="j-num">$1</span>')
      .replace(/:\s*(true|false)/g, ': <span class="j-num">$1</span>')
      .replace(/:\s*(null)/g, ': <span class="j-null">$1</span>');
  }

  function rebuild() {
    var profile = buildProfileData();
    var json = JSON.stringify(profile, null, 2);
    var out = document.getElementById('json-out');
    if (out) out.innerHTML = highlight(json);
    updateProgress(profile);
    updateStepBadges(profile);
  }

  function updateProgress(profile) {
    var total = 6, done = 0;
    if (profile.identity && (profile.identity.name || profile.identity.role)) done++;
    if (profile.preferences && Object.keys(profile.preferences).length) done++;
    if (profile.projects && profile.projects.length) done++;
    if (profile.terminology && Object.keys(profile.terminology).length) done++;
    if (profile.constraints && Object.keys(profile.constraints).length) done++;
    if (profile.session && Object.keys(profile.session).length) done++;
    var pf = document.getElementById('progress-fill');
    if (pf) pf.style.width = Math.round(done / total * 100) + '%';
  }

  function updateStepBadges(profile) {
    var checks = [
      profile.identity && (profile.identity.name || profile.identity.role),
      profile.preferences && Object.keys(profile.preferences).length,
      profile.projects && profile.projects.length,
      profile.terminology && Object.keys(profile.terminology).length,
      profile.constraints && Object.keys(profile.constraints).length,
      profile.session && Object.keys(profile.session).length
    ];
    checks.forEach(function(done, i) {
      var num = document.getElementById('num-' + (i+1));
      if (!num) return;
      if (done) { num.classList.add('done'); num.textContent = '\u2713'; }
      else { num.classList.remove('done'); num.textContent = i+1; }
    });
  }

  function loadExample(idx) {
    var ex = EXAMPLES[idx];
    if (!ex) return;
    document.getElementById('profile-name').value = ex.name;
    activeProfileId = null;
    restoreFormData(ex.data);
    refreshProfileList();
    rebuild();
    // Open step 1
    document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('open'); });
    var s1 = document.getElementById('step-1');
    if (s1) s1.classList.add('open');
    // Show a prominent loaded banner — insert before the grid, not inside it
    var banner = document.getElementById('example-loaded-banner');
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'example-loaded-banner';
      banner.style.cssText = 'background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.35);border-radius:10px;padding:10px 16px;font-size:.85rem;color:#6ee7b7;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;justify-content:space-between;';
      var shell = document.querySelector('.builder-shell');
      if (shell) shell.parentNode.insertBefore(banner, shell);
    }
    banner.innerHTML = '<span>&#10003; Example loaded: <strong>' + esc(ex.name) + '</strong> — edit any field and click Save to keep it</span>' +
      '<button onclick="document.getElementById(\"example-loaded-banner\").style.display=\"none\"" style="background:none;border:none;color:#6ee7b7;cursor:pointer;font-size:1rem;padding:0;">&times;</button>';
    banner.style.display = 'flex';
    // Scroll to the top of the builder area (hero section)
    var hero = document.querySelector('.builder-hero');
    if (hero) { window.scrollTo({ top: hero.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' }); }
  }

  // ── Copy / Download ───────────────────────────────────────────────
  function copyProfile() {
    var profile = buildProfileData();
    navigator.clipboard.writeText(JSON.stringify(profile, null, 2)).then(function() {
      var btn = document.getElementById('copy-btn');
      btn.textContent = '\u2713 Copied!';
      btn.classList.add('copied');
      setTimeout(function() { btn.innerHTML = '&#128203; Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function downloadProfile() {
    var profile = buildProfileData();
    var json = JSON.stringify(profile, null, 2);
    var blob = new Blob([json], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    var pname = (document.getElementById('profile-name').value || 'my').toLowerCase().replace(/[^a-z0-9]+/g, '-');
    a.download = pname + '-ai-profile.json';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // ── Toast ─────────────────────────────────────────────────────────
  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2200);
  }

  // ── Helpers ───────────────────────────────────────────────────────
  function v(id) { var el = document.getElementById(id); return el ? (el.value || '').trim() : ''; }
  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
